# ==========================================================================
# 🛠️ CAMADA DE INFRAESTRUTURA COMO CÓDIGO (AWS SAM TEMPLATE) - REVISADA
# ==========================================================================
# Projeto: CrediFácil IDP Engine
# Padrão Arquitetural: Smart Writer Pattern & Desacoplamento SOLID (S.R.P)
# Versão: 2026.06.19_Final
# ==========================================================================

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CrediFacil IDP - Pipeline IDP Serverless de Alta Performance (Hackathon 2026)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  BdaProjectId:
    Type: String
    Default: "e020be1b735a"

Globals:
  Function:
    Runtime: python3.12
    Architectures: 
      - arm64
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Layers:
      - !Ref CrediFacilDependenciesLayer
    Environment:
      Variables:
        ENV: !Ref Environment
        DYNAMODB_TABLE: !Ref CrediFacilDynamoTable
        CLIENTS_DYNAMODB_TABLE: !Ref CrediFacilClientesTable
        SNS_COMPLETION_TOPIC_ARN: !Ref SnsTopicoConclusao
        SNS_ERROR_TOPIC_ARN: !Ref SnsTopicoErros

Resources:
  # ==========================================================================
  # 🔑 DEPENDÊNCIAS & COMPONENTES BASE
  # ==========================================================================
  CrediFacilDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "credifacil-dependencies-${Environment}"
      ContentUri: ../src/layers/dependencies/
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - arm64
    Metadata:
      BuildMethod: python3.12

  BucketEntrada:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-entrada-${Environment}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - "PUT"
              - "POST"
              - "GET"
            AllowedOrigins:
              - "*"
            MaxAge: 3000
      Tags:
        - Key: Criador
          Value: Grupo12

  BucketSaida:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-saida-${Environment}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - "GET"
            AllowedOrigins:
              - "*"
            MaxAge: 3000
      Tags:
        - Key: Criador
          Value: Grupo12

  CrediFacilFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-idp-grupo12-novo-frontend-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      Tags:
        - Key: Criador
          Value: Grupo12

  CrediFacilFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CrediFacilFrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub "arn:aws:s3:::credifacil-idp-grupo12-novo-frontend-${Environment}/*"

  # ==========================================================================
  # 🗄️ CAMADA DE ARMAZENAMENTO (Tabelas Isoladas de Domínio)
  # ==========================================================================
  CrediFacilDynamoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "credifacil-pacotes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Criador
          Value: Grupo12

  CrediFacilClientesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "credifacil-clientes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      Tags:
        - Key: Criador
          Value: Grupo12

  # ==========================================================================
  # 📢 ECOSSISTEMA DE MENSAGERIA (Amazon SNS)
  # ==========================================================================
  SnsTopicoConclusao:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-conclusao-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  SnsTopicoErros:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-erros-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  # ==========================================================================
  # 🌐 INFRAESTRUTURA ORIENTADA A EVENTOS (EVENTBRIDGE & SQS)
  # ==========================================================================
  CrediFacilEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "credifacil-idp-bus-${Environment}"

  CrediFacilReviewDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "credifacil-human-review-dlq-${Environment}"
      MessageRetentionPeriod: 1209600 

  CrediFacilReviewQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "credifacil-human-review-queue-${Environment}"
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt CrediFacilReviewDLQ.Arn
        maxReceiveCount: 3 

  CrediFacilDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alerta ativo de mensagens retidas na DLQ de Revisão Humana do CrediFácil"
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: "QueueName"
          Value: !GetAtt CrediFacilReviewDLQ.QueueName
      Statistic: "Sum"
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      AlarmActions:
        - !Ref SnsTopicoErros

  LowConfidenceRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "credifacil-low-confidence-rule-${Environment}"
      EventBusName: !Ref CrediFacilEventBus
      EventPattern:
        source:
          - "credifacil.idp"
        detail-type:
          - "LowConfidenceFieldsDetected"
      Targets:
        - Arn: !GetAtt CrediFacilReviewQueue.Arn
          Id: "ReviewQueueTarget"

  QueuePolicyForEventBridge:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref CrediFacilReviewQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "events.amazonaws.com"
            Action: "sqs:SendMessage"
            Resource: !GetAtt CrediFacilReviewQueue.Arn

  # ==========================================================================
  # 🌐 CAMADA DE EXPOSIÇÃO DA API REST
  # ==========================================================================
  CrediFacilRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'DELETE,GET,HEAD,OPTIONS,PATCH,POST,PUT'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Requested-With'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
    Tags:
      Criador: Grupo12

  # ==========================================================================
  # 🚀 COMPONENTES DE ENTRADA
  # ==========================================================================
  PreSignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.pre_signed_url.handler.handler
      Environment:
        Variables:
          BUCKET_ENTRADA: !Sub "credifacil-docs-entrada-${Environment}"
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-entrada-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/upload-urls
            Method: post
            RestApiId: !Ref CrediFacilRestApi
    Tags:
      Criador: Grupo12

  PipelineTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.pipeline_trigger.handler.handler
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:credifacil-idp-pipeline-${Environment}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement:
            - Sid: AllowStepFunctionsExecution
              Effect: Allow
              Action: "states:StartExecution"
              Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:credifacil-idp-pipeline-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}/process
            Method: post
            RestApiId: !Ref CrediFacilRestApi
    Tags:
      Criador: Grupo12

  S3UploadTrackerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.s3_upload_tracker.handler.handler
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:credifacil-idp-pipeline-${Environment}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement:
            - Sid: AllowStepFunctionsExecution
              Effect: Allow
              Action: "states:StartExecution"
              Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:credifacil-idp-pipeline-${Environment}"
      Events:
        S3ObjectCreatedEvent:
          Type: S3
          Properties:
            Bucket: !Ref BucketEntrada
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: packages/
    Tags:
      Criador: Grupo12

  # ==========================================================================
  # 💡 COMPONENTES INTERNOS DO WORKFLOW
  # ==========================================================================
  BdaInvokerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.bda_invoker.handler.handler
      MemorySize: 512
      Environment:
        Variables:
          BDA_PROJECT_ARN: !Sub "arn:aws:bedrock:us-east-1:${AWS::AccountId}:data-automation-project/${BdaProjectId}"
          BUCKET_ENTRADA: !Sub "credifacil-docs-entrada-${Environment}"
          BUCKET_SAIDA: !Sub "credifacil-docs-saida-${Environment}"
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-entrada-${Environment}"
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - Statement:
            - Sid: PermissaoListagemParaPastasS3
              Effect: Allow
              Action:
                - "s3:ListBucket"
                - "s3:ListBucketVersions"
              Resource:
                - !Sub "arn:aws:s3:::credifacil-docs-entrada-${Environment}"
                - !Sub "arn:aws:s3:::credifacil-docs-saida-${Environment}"
            - Sid: AllowBedrockAutomationAsync
              Effect: Allow
              Action: 
                - "bedrock:InvokeDataAutomationAsync"
                - "sts:GetCallerIdentity"
              Resource: "*"
    Tags:
      Criador: Grupo12

  BdaStatusPollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.bda_status_poller.handler.handler
      Policies:
        - Statement:
            - Sid: AllowGetAutomationStatus
              Effect: Allow
              Action: "bedrock:GetDataAutomationStatus"
              Resource: "*"
    Tags:
      Criador: Grupo12

  ConfidenceCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.confidence_checker.handler.handler
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref CrediFacilEventBus
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement:
            - Effect: Allow
              Action: "events:PutEvents"
              Resource: !GetAtt CrediFacilEventBus.Arn
    Tags:
      Criador: Grupo12

  NovaStructurerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.nova_structurer.handler.handler
      MemorySize: 1024
      Timeout: 120
      Environment:
        Variables:
          BUCKET_SAIDA: !Sub "credifacil-docs-saida-${Environment}"
          BDA_PROJECT_ARN: !Sub "arn:aws:bedrock:us-east-1:${AWS::AccountId}:data-automation-project/${BdaProjectId}"
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        # 🚀 AJUSTE ADICIONADO: Concede permissão de leitura para que possa consultar a flag execute_score de forma segura assíncrona
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement:
            - Sid: AllowBedrockNovaInvoke
              Effect: Allow
              Action: "bedrock:InvokeModel"
              Resource: "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0"
    Tags:
      Criador: Grupo12

  ExcelGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub credifacil-excel-generator-${Env}
      CodeUri: .
      Handler: src.lambdas.excel_generator.handler.handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          ENV: !Ref Env
          DYNAMODB_TABLE: !Ref PacotesTable
          BUCKET_SAIDA: !Ref DocumentsOutputBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsOutputBucket
        - S3WritePolicy:
            BucketName: !Ref DocumentsOutputBucket
      Tags:
        Criador: Grupo12
        Environment: !Ref Env

  CustomerConsolidatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.customer_consolidator.handler.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - Statement:
            - Effect: Allow
              Action: "bedrock:InvokeModel"
              Resource: "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0"
    Tags:
      Criador: Grupo12

  ResultWriterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.result_writer.handler.handler
      Environment:
        Variables:
          BUCKET_SAIDA: !Sub "credifacil-docs-saida-${Environment}"
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-clientes-${Environment}"
    Tags:
      Criador: Grupo12

  QueryHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.query_handler.handler.handler
      Environment:
        Variables:
          BUCKET_SAIDA: !Sub "credifacil-docs-saida-${Environment}"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-clientes-${Environment}"
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}
            Method: get
            RestApiId: !Ref CrediFacilRestApi
    Tags:
      Criador: Grupo12

  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.notification.handler.handler
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !Sub "credifacil-conclusao-${Environment}"
        - SNSPublishMessagePolicy:
            TopicName: !Sub "credifacil-erros-${Environment}"
    Tags:
      Criador: Grupo12

  CrediFacilStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "credifacil-idp-pipeline-${Environment}"
      DefinitionUri: ../state_machines/idp_pipeline.json
      Role: !GetAtt CrediFacilStateMachineRole.Arn
      DefinitionSubstitutions:
        BdaInvokerArn: !GetAtt BdaInvokerFunction.Arn
        BdaStatusPollerArn: !GetAtt BdaStatusPollerFunction.Arn
        ConfidenceCheckerArn: !GetAtt ConfidenceCheckerFunction.Arn
        NovaStructurerArn: !GetAtt NovaStructurerFunction.Arn
        ExcelGeneratorArn: !GetAtt ExcelGeneratorFunction.Arn
        CustomerConsolidatorArn: !GetAtt CustomerConsolidatorFunction.Arn
        ResultWriterArn: !GetAtt ResultWriterFunction.Arn
        NotificationArn: !GetAtt NotificationFunction.Arn
    Tags:
      Criador: Grupo12

  CrediFacilStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !Sub "arn:aws:iam::${AWS::AccountId}:policy/grupo-alunos-permission-boundary"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CrediFacilStateMachinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowLambdaInvocation
                Effect: Allow
                Action: "lambda:InvokeFunction"
                Resource:
                  - !GetAtt BdaInvokerFunction.Arn
                  - !GetAtt BdaStatusPollerFunction.Arn
                  - !GetAtt ConfidenceCheckerFunction.Arn
                  - !GetAtt NovaStructurerFunction.Arn
                  - !GetAtt ExcelGeneratorFunction.Arn
                  - !GetAtt CustomerConsolidatorFunction.Arn
                  - !GetAtt ResultWriterFunction.Arn
                  - !GetAtt NotificationFunction.Arn
      Tags:
        - Key: Criador
          Value: Grupo12

Outputs:
  ApiEndpoint:
    Description: URL Base da API REST no API Gateway
    Value: !Sub "https://${CrediFacilRestApi}.execute-api.us-east-1.amazonaws.com/${Environment}/"

  FrontendWebsiteUrl:
    Description: URL Oficial do Novo Site Estatíco do Front-End (Isolado)
    Value: !GetAtt CrediFacilFrontendBucket.WebsiteURL