AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CrediFacil IDP - Pipeline IDP Serverless de Alta Performance (Hackathon 2026)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  BdaProjectId:
    Type: String
    Default: "e020be1b735a"

Globals:
  Function:
    Runtime: python3.12
    Architectures: 
      - arm64
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Layers:
      - !Ref CrediFacilDependenciesLayer
    Environment:
      Variables:
        ENV: !Ref Environment
        DYNAMODB_TABLE: !Ref CrediFacilDynamoTable
        CLIENTS_DYNAMODB_TABLE: !Ref CrediFacilClientesTable
        BUCKET_ENTRADA: !Ref BucketEntrada
        BUCKET_SAIDA: !Ref BucketSaida
        SNS_COMPLETION_TOPIC_ARN: !Ref SnsTopicoConclusao
        SNS_ERROR_TOPIC_ARN: !Ref SnsTopicoErros

Resources:
  # ==========================================================================
  # 🔑 CAMADA DE PERSISTÊNCIA DEDICADA (Tabela Mestre de Clientes)
  # ==========================================================================
  CrediFacilClientesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "credifacil-clientes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      Tags:
        - Key: Criador
          Value: Grupo12

  # ==========================================================================
  # 🗂️ CAMADA DE PROCESSAMENTO DE ESTEIRA (Tabela Transacional de Lotes)
  # ==========================================================================
  CrediFacilDynamoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "credifacil-pacotes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Criador
          Value: Grupo12

  # ==========================================================================
  # 🚀 LAMBDAS CORE: ATUALIZAÇÃO DE POLÍTICAS DE ACESSO (Princípio do Menor Privilégio)
  # ==========================================================================
  ResultWriterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.result_writer.handler.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        # 🚀 ATUALIZAÇÃO DE SEGURANÇA: Concede permissão de escrita/leitura na nova tabela mestre
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-clientes-${Environment}"
      Tags:
        Criador: Grupo12

  QueryHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.query_handler.handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        # 🚀 ATUALIZAÇÃO DE SEGURANÇA: Permite que o resolvedor de buscas consulte perfis estáveis se necessário
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-clientes-${Environment}"
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}
            Method: get
            RestApiId: !Ref CrediFacilRestApi
      Tags:
        Criador: Grupo12

  # ==========================================================================
  # 📢 RECURSOS ADICIONAIS DO ECOSSISTEMA (Garantindo a consistência das Tags)
  # ==========================================================================
  PreSignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.pre_signed_url.handler.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-entrada-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/upload-urls
            Method: post
            RestApiId: !Ref CrediFacilRestApi
      Tags:
        Criador: Grupo12

  PipelineTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.lambdas.pipeline_trigger.handler.handler
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref CrediFacilStateMachine
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement:
            - Sid: AllowStepFunctionsExecution
              Effect: Allow
              Action: "states:StartExecution"
              Resource: !Ref CrediFacilStateMachine
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}/process
            Method: post
            RestApiId: !Ref CrediFacilRestApi
      Tags:
        Criador: Grupo12

  BucketEntrada:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-entrada-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  BucketSaida:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-saida-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  SnsTopicoConclusao:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-conclusao-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  SnsTopicoErros:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-erros-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12