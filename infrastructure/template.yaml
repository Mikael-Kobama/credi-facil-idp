AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CrediFacil IDP - Infraestrutura Completa de Pipelines e Lambdas (Hackathon 2026)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Ambiente de implantacao (dev ou prod)

Globals:
  Function:
    Runtime: python3.12
    Architectures: 
      - x86_64 # RNF-05: Arquitetura Graviton2 para máxima eficiência e menor custo
    Timeout: 30
    MemorySize: 256
    Tracing: Active # RO-04: Ativa o rastreio distribuído do AWS X-Ray automaticamente
    Environment:
      Variables:
        ENV: !Ref Environment
        DYNAMODB_TABLE: !Ref CrediFacilDynamoTable
        BUCKET_ENTRADA: !Ref BucketEntrada
        BUCKET_SAIDA: !Ref BucketSaida
        SNS_COMPLETION_TOPIC_ARN: !Ref SnsTopicoConclusao
        SNS_ERROR_TOPIC_ARN: !Ref SnsTopicoErros

Resources:
  # ==========================================================================
  # 🔑 CAMADA DE SEGURANÇA E ARMAZENAMENTO BASE
  # ==========================================================================
  CrediFacilKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "Chave KMS para criptografia em repouso - CrediFacil (${Environment})"
      Enabled: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Permitir uso total da chave pela conta raiz
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  BucketEntrada:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-entrada-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyId: !Ref CrediFacilKmsKey

  BucketSaida:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-saida-${Environment}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyId: !Ref CrediFacilKmsKey

  CrediFacilDynamoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "credifacil-pacotes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref CrediFacilKmsKey
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # ==========================================================================
  # 🔐 PROVEDOR DE IDENTIDADE (Amazon Cognito)
  # ==========================================================================
  CrediFacilUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "credifacil-users-${Environment}"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email

  CrediFacilUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "credifacil-web-client-${Environment}"
      UserPoolId: !Ref CrediFacilUserPool
      GenerateSecret: false

  CrediFacilProfissionalGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: "Profissional"
      Description: "Grupo de profissionais e analistas de crédito do CrediFácil"
      UserPoolId: !Ref CrediFacilUserPool

  CrediFacilAdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref CrediFacilUserPool
      Username: "admin@credifacil.com.br"
      UserAttributes:
        - Name: email
          Value: "admin@credifacil.com.br"
        - Name: email_verified
          Value: "true"

  # ==========================================================================
  # 🤖 MOTOR DE INTELIGÊNCIA ARTIFICIAL (Amazon Bedrock)
  # ==========================================================================
  BedrockDataAutomationProject:
    Type: AWS::Bedrock::DataAutomationProject
    Properties:
      ProjectName: !Sub "credifacil-idp-project-${Environment}"
      ProjectDescription: 'Projeto automatizado para extração de documentos do caso CrediFácil'
      ProjectType: 'ASYNC'
      StandardOutputConfiguration:
        Document:
          Extraction:
            Granularity:
              Types:
                - 'DOCUMENT'
                - 'PAGE'
            BoundingBox:
              State: 'ENABLED'
          GenerativeField:
            State: 'ENABLED'

  # ==========================================================================
  # 📢 CAMADA DE NOTIFICAÇÕES (Amazon SNS)
  # ==========================================================================
  SnsTopicoConclusao:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-conclusao-${Environment}"
      KmsMasterKeyId: !Ref CrediFacilKmsKey

  SnsTopicoErros:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-erros-${Environment}"
      KmsMasterKeyId: !Ref CrediFacilKmsKey

  # ==========================================================================
  # 🌐 CAMADA DE ROTEAMENTO (Amazon API Gateway REST)
  # ==========================================================================
  CrediFacilRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CrediFacilUserPool.Arn
            IdentitySource: method.request.header.Authorization

  # ==========================================================================
  # 🚀 DECLARAÇÃO DAS FUNÇÕES LAMBDA (Core & API)
  # ==========================================================================

  PreSignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/pre_signed_url/
      Handler: handler.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-entrada-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/upload-urls
            Method: post
            RestApiId: !Ref CrediFacilRestApi

  PipelineTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/pipeline_trigger/
      Handler: handler.handler
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref CrediFacilStateMachine
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement:
            - Sid: AllowStepFunctionsExecution
              Effect: Allow
              Action: "states:StartExecution"
              Resource: !Ref CrediFacilStateMachine
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}/process
            Method: post
            RestApiId: !Ref CrediFacilRestApi

  BdaInvokerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/bda_invoker/
      Handler: handler.handler
      MemorySize: 512
      Environment:
        Variables:
          BDA_PROJECT_ARN: !Ref BedrockDataAutomationProject
      Policies:
        - Statement:
            - Sid: AllowBedrockAutomationAsync
              Effect: Allow
              Action: 
                - "bedrock:InvokeDataAutomationAsync"
                - "sts:GetCallerIdentity"
              Resource: "*"

  BdaStatusPollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/bda_status_poller/
      Handler: handler.handler
      Policies:
        - Statement:
            - Sid: AllowGetAutomationStatus
              Effect: Allow
              Action: "bedrock:GetDataAutomationStatus"
              Resource: "*"

  ConfidenceCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/confidence_checker/
      Handler: handler.handler
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"

  NovaStructurerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/nova_structurer/
      Handler: handler.handler
      MemorySize: 1024
      Timeout: 120
      Policies:
        - Statement:
            - Sid: AllowBedrockNovaInvoke
              Effect: Allow
              Action: "bedrock:InvokeModel"
              Resource: "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0"

  ResultWriterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/result_writer/
      Handler: handler.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement: 
            - Sid: AllowKMSOperationsForPersistence
              Effect: Allow
              Action:
                - "kms:Encrypt"
                - "kms:Decrypt"
                - "kms:GenerateDataKey"
              Resource: !GetAtt CrediFacilKmsKey.Arn

  QueryHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/query_handler/
      Handler: handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}
            Method: get
            RestApiId: !Ref CrediFacilRestApi

  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/notification/
      Handler: handler.handler
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt SnsTopicoConclusao.TopicName
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt SnsTopicoErros.TopicName

  # ==========================================================================
  # 🔄 ORQUESTRADOR CENTRAL (AWS Step Functions)
  # ==========================================================================
  CrediFacilStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "credifacil-idp-pipeline-${Environment}"
      DefinitionUri: ../state_machines/idp_pipeline.json
      DefinitionSubstitutions:
        BdaInvokerArn: !GetAtt BdaInvokerFunction.Arn
        BdaStatusPollerArn: !GetAtt BdaStatusPollerFunction.Arn
        ConfidenceCheckerArn: !GetAtt ConfidenceCheckerFunction.Arn
        A2iTriggerArn: !GetAtt A2iTriggerFunction.Arn
        NovaStructurerArn: !GetAtt NovaStructurerFunction.Arn
        ResultWriterArn: !GetAtt ResultWriterFunction.Arn
        NotificationArn: !GetAtt NotificationFunction.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt CrediFacilStateMachineLogGroup.Arn
        IncludeExecutionData: true
        Level: ALL
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref BdaInvokerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref BdaStatusPollerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ConfidenceCheckerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref A2iTriggerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref NovaStructurerFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ResultWriterFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref NotificationFunction

  CrediFacilStateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/vended/states/credifacil-idp-pipeline-${Environment}"
      RetentionInDays: 7

  # ==========================================================================
  # 👥 CAMADA DE AUDITORIA HUMANA DECLARATIVA (Amazon A2I / SageMaker)
  # ==========================================================================
  PrivateWorkforce:
    Type: AWS::SageMaker::Workforce
    Properties:
      WorkforceName: !Sub "credifacil-force-${Environment}"
      CognitoConfig:
        UserPool: !Ref CrediFacilUserPool
        ClientId: !Ref CrediFacilUserPoolClient

  CrediFacilWorkTeam:
    Type: AWS::SageMaker::Workteam
    Properties:
      WorkteamName: !Sub "credifacil-analistas-${Environment}"
      WorkforceName: !Ref PrivateWorkforce
      Description: 'Equipe para revisao humana A2I do CrediFacil'
      MemberDefinitions:
        - CognitoMemberDefinition:
            UserPool: !Ref CrediFacilUserPool
            UserGroup: !Ref CrediFacilProfissionalGroup
            ClientId: !Ref CrediFacilUserPoolClient
    DependsOn: PrivateWorkforce

  CrediFacilA2IRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: CrediFacilA2IS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:ListBucket"
                Resource:
                  - !Sub "arn:aws:s3:::credifacil-docs-saida-${Environment}"
                  - !Sub "arn:aws:s3:::credifacil-docs-saida-${Environment}/*"

  CrediFacilHumanTaskUi:
    Type: AWS::SageMaker::HumanTaskUi
    Properties:
      HumanTaskUiName: !Sub "credifacil-review-ui-${Environment}"
      UiTemplate:
        Content: |
          <script src="https://assets.crowd.aws/crowd-html-element.js"></script>
          <crowd-form>
            <div style="padding: 20px; font-family: Arial, sans-serif;">
              <h2 style="color: #232f3e;">🚨 Revisão de Documentos Hipotecários — CrediFácil</h2>
              <p>A inteligência artificial identificou baixa confiança na extração dos dados pessoais deste pacote. Por favor, revise e corrigja as informações abaixo.</p>
              <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="flex: 1; background-color: #f2f3f3; padding: 15px; border-radius: 5px;">
                  <h3>Campos Críticos Solicitados</h3>
                  <p><strong>Nome Completo:</strong> Certifique-se de que não há abreviações incorretas.</p>
                  <p><strong>CPF:</strong> Deve conter 11 dígitos. Corrija pontuações se necessário.</p>
                  <p><strong>Data de Nascimento:</strong> Formato padrão esperado YYYY-MM-DD.</p>
                </div>
                <div style="flex: 1; background-color: #ffffff; padding: 15px; border: 1px solid #eaeded; border-radius: 5px;">
                  <h3>Formulário de Ajuste</h3>
                  <p>
                    <label for="nome">Nome Completo do Cliente:</label><br>
                    <crowd-input name="nome" value="{{ task.input.extractedFields.nome.value }}" required></crowd-input>
                  </p>
                  <p>
                    <label for="cpf">CPF Formatado:</label><br>
                    <crowd-input name="cpf" value="{{ task.input.extractedFields.cpf.value }}" required></crowd-input>
                  </p>
                  <p>
                    <label for="data_nascimento">Data de Nascimento:</label><br>
                    <crowd-input name="data_nascimento" value="{{ task.input.extractedFields.data_nascimento.value }}" type="date" required></crowd-input>
                  </p>
                </div>
              </div>
            </div>
          </crowd-form>

  CrediFacilFlowDefinition:
    Type: AWS::SageMaker::FlowDefinition
    Properties:
      FlowDefinitionName: !Sub "credifacil-pipeline-flow-${Environment}"
      RoleArn: !GetAtt CrediFacilA2IRole.Arn
      HumanLoopConfig:
        HumanTaskUiArn: !Ref CrediFacilHumanTaskUi
        TaskTitle: "Revisão de Confiança - CrediFácil"
        TaskDescription: "Auditoria de dados extraídos com baixa confiança."
        WorkteamArn: !GetAtt CrediFacilWorkTeam.WorkteamArn # 👈 100% Automatizado e Dinâmico!
      OutputConfig:
        S3OutputPath: !Sub "s3://credifacil-docs-saida-${Environment}/a2i-results/"

  A2iTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/a2i_trigger/
      Handler: handler.handler
      Environment:
        Variables:
          A2I_FLOW_DEFINITION_ARN: !Ref CrediFacilFlowDefinition
      Policies:
        - Statement:
            - Sid: AllowSageMakerA2I
              Effect: Allow
              Action: "sagemaker:StartHumanLoop"
              Resource: "*"

Outputs:
  ApiEndpoint:
    Description: URL Base da API REST no API Gateway para consumo do Frontend
    Value: !Sub "https://${CrediFacilRestApi}.execute-api.us-east-1.amazonaws.com/${Environment}/"

  UserPoolId:
    Description: ID do User Pool do Cognito gerado para o ambiente
    Value: !Ref CrediFacilUserPool

  UserPoolClientId:
    Description: ID do Client do Cognito para autenticação
    Value: !Ref CrediFacilUserPoolClient