AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  CrediFacil IDP - Pipeline IDP Serverless de Alta Performance (Hackathon 2026)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  BdaProjectId:
    Type: String
    Default: "e020be1b735a"

Globals:
  Function:
    Runtime: python3.12
    Architectures: 
      - arm64
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Layers:
      - !Ref CrediFacilDependenciesLayer
    Environment:
      Variables:
        ENV: !Ref Environment
        DYNAMODB_TABLE: !Ref CrediFacilDynamoTable
        CLIENTS_DYNAMODB_TABLE: !Ref CrediFacilClientesTable
        BUCKET_ENTRADA: !Ref BucketEntrada
        BUCKET_SAIDA: !Ref BucketSaida
        SNS_COMPLETION_TOPIC_ARN: !Ref SnsTopicoConclusao
        SNS_ERROR_TOPIC_ARN: !Ref SnsTopicoErros

Resources:
  # ==========================================================================
  # 🔑 DEPENDÊNCIAS & COMPONENTES BASE
  # ==========================================================================
  CrediFacilDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "credifacil-dependencies-${Environment}"
      ContentUri: ../src/layers/dependencies/
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - arm64
    Metadata:
      BuildMethod: python3.12

  BucketEntrada:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-entrada-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  BucketSaida:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "credifacil-docs-saida-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  # ==========================================================================
  # 🗄️ CAMADA DE ARMAZENAMENTO (Tabelas Isoladas de Domínio)
  # ==========================================================================
  CrediFacilDynamoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "credifacil-pacotes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Criador
          Value: Grupo12

  CrediFacilClientesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "credifacil-clientes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      Tags:
        - Key: Criador
          Value: Grupo12

  # ==========================================================================
  # 📢 ECOSSISTEMA DE MENSAGERIA (Amazon SNS)
  # ==========================================================================
  SnsTopicoConclusao:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-conclusao-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  SnsTopicoErros:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "credifacil-erros-${Environment}"
      Tags:
        - Key: Criador
          Value: Grupo12

  # ==========================================================================
  # 🌐 CAMADA DE EXPOSIÇÃO DA API REST
  # ==========================================================================
  CrediFacilRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors: "'*'"
    Tags:
      Criador: Grupo12

  # ==========================================================================
  # 🚀 FUNÇÕES LAMBDA CORE
  # ==========================================================================
  PreSignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/pre_signed_url/
      Handler: handler.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-entrada-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/upload-urls
            Method: post
            RestApiId: !Ref CrediFacilRestApi
    Tags:
      Criador: Grupo12

  PipelineTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/pipeline_trigger/
      Handler: handler.handler
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref CrediFacilStateMachine
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - Statement:
            - Sid: AllowStepFunctionsExecution
              Effect: Allow
              Action: "states:StartExecution"
              Resource: !Ref CrediFacilStateMachine
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}/process
            Method: post
            RestApiId: !Ref CrediFacilRestApi
    Tags:
      Criador: Grupo12

  BdaInvokerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/bda_invoker/
      Handler: handler.handler
      MemorySize: 512
      Environment:
        Variables:
          BDA_PROJECT_ARN: !Sub "arn:aws:bedrock:us-east-1:${AWS::AccountId}:data-automation-project/${BdaProjectId}"
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-entrada-${Environment}"
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - Statement:
            - Sid: AllowBedrockAutomationAsync
              Effect: Allow
              Action: 
                - "bedrock:InvokeDataAutomationAsync"
                - "sts:GetCallerIdentity"
              Resource: "*"
    Tags:
      Criador: Grupo12

  BdaStatusPollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/bda_status_poller/
      Handler: handler.handler
      Policies:
        - Statement:
            - Sid: AllowGetAutomationStatus
              Effect: Allow
              Action: "bedrock:GetDataAutomationStatus"
              Resource: "*"
    Tags:
      Criador: Grupo12

  NovaStructurerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/nova_structurer/
      Handler: handler.handler
      MemorySize: 1024
      Timeout: 120
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - Statement:
            - Sid: AllowBedrockNovaInvoke
              Effect: Allow
              Action: "bedrock:InvokeModel"
              Resource: "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0"
    Tags:
      Criador: Grupo12

  ResultWriterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/result_writer/
      Handler: handler.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "credifacil-clientes-${Environment}"
    Tags:
      Criador: Grupo12

  QueryHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/query_handler/
      Handler: handler.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-pacotes-${Environment}"
        - DynamoDBReadPolicy:
            TableName: !Sub "credifacil-clientes-${Environment}"
        - S3ReadPolicy:
            BucketName: !Sub "credifacil-docs-saida-${Environment}"
      Events:
        ApiGatewayTrigger:
          Type: Api
          Properties:
            Path: /v1/packages/{packageId}
            Method: get
            RestApiId: !Ref CrediFacilRestApi
    Tags:
      Criador: Grupo12

  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/lambdas/notification/
      Handler: handler.handler
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !Sub "credifacil-conclusao-${Environment}"
        - SNSPublishMessagePolicy:
            TopicName: !Sub "credifacil-erros-${Environment}"
    Tags:
      Criador: Grupo12

  # ==========================================================================
  # ⚙️ ORQUESTRADOR SERVERLESS (AWS Step Functions)
  # ==========================================================================
  CrediFacilStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "credifacil-idp-pipeline-${Environment}"
      DefinitionUri: ../state_machines/idp_pipeline.json
      Role: !GetAtt CrediFacilStateMachineRole.Arn
      DefinitionSubstitutions:
        BdaInvokerArn: !GetAtt BdaInvokerFunction.Arn
        BdaStatusPollerArn: !GetAtt BdaStatusPollerFunction.Arn
        NovaStructurerArn: !GetAtt NovaStructurerFunction.Arn
        ResultWriterArn: !GetAtt ResultWriterFunction.Arn
        NotificationArn: !GetAtt NotificationFunction.Arn
    Tags:
      Criador: Grupo12

  CrediFacilStateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !Sub "arn:aws:iam::${AWS::AccountId}:policy/grupo-alunos-permission-boundary"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
          # 🚀 CORREÇÃO: Tags movidas para dentro de Properties
      Tags:
        - Key: Criador
          Value: Grupo12
      Policies:
        - PolicyName: CrediFacilStateMachinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowLambdaInvocation
                Effect: Allow
                Action: "lambda:InvokeFunction"
                Resource:
                  - !GetAtt BdaInvokerFunction.Arn
                  - !GetAtt BdaStatusPollerFunction.Arn
                  - !GetAtt NovaStructurerFunction.Arn
                  - !GetAtt ResultWriterFunction.Arn
                  - !GetAtt NotificationFunction.Arn

Outputs:
  ApiEndpoint:
    Description: URL Base da API REST no API Gateway
    Value: !Sub "https://${CrediFacilRestApi}.execute-api.us-east-1.amazonaws.com/${Environment}/"